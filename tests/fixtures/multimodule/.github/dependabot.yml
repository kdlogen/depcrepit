version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # exact dependency-name + version range -> <rule> + <ignoreVersion type="range">
      - dependency-name: "com.google.guava:guava"
        versions: [">=33.0"]
      # version wildcard (X.x) -> <ignoreVersion type="regex">
      - dependency-name: "commons-io:commons-io"
        versions: ["2.6.x"]
      # WILDCARD artifactId -> matches every org.slf4j:* artifact (caps it at 1.7.x)
      - dependency-name: "org.slf4j:*"
        versions: [">=1.8"]
